# docker-compose.prod.yml — Pull pre-built images from GitHub Container Registry.
#
# Use this on any device that has Docker but NOT the source code.
# Copy this file + .env to the target machine, then:
#
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Create a .env file (copy from .env.example or set manually):
#        OPENAI_API_KEY=sk-...
#        POSTGRES_PASSWORD=<strong-password>
#        ADMIN_PASSWORD=<strong-password>
#
#   2. Log in to GHCR (if the repo is private):
#        echo $GITHUB_PAT | docker login ghcr.io -u <username> --password-stdin
#
# To update to the latest version:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ph_advisor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ph_advisor}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ph_advisor}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis (message broker + result backend) ────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Flask web UI ───────────────────────────────────────────────────────────
  web:
    image: ${APP_IMAGE:-ghcr.io/phdwight/agentic-ph-stocks-advisor:latest}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5000}:5000"
    environment: &shared-env
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_MINI_MODEL: ${OPENAI_MINI_MODEL:-gpt-4o-mini}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.0}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      TAVILY_MAX_RESULTS: ${TAVILY_MAX_RESULTS:-5}
      TAVILY_SEARCH_DEPTH: ${TAVILY_SEARCH_DEPTH:-basic}
      DB_BACKEND: postgres
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-ph_advisor}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ph_advisor}
      REDIS_URL: redis://redis:6379/0
      DRAGONFI_BASE_URL: ${DRAGONFI_BASE_URL:-https://api.dragonfi.ph/api/v2}
      PSE_EDGE_BASE_URL: ${PSE_EDGE_BASE_URL:-https://edge.pse.com.ph}
      TRADINGVIEW_SCANNER_URL: ${TRADINGVIEW_SCANNER_URL:-https://scanner.tradingview.com/philippines/scan}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-15}
      TIMEZONE: ${TIMEZONE:-Asia/Manila}
      OUTPUT_DIR: /app/output
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-common}
      ENTRA_REDIRECT_PATH: ${ENTRA_REDIRECT_PATH:-/auth/callback}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-ph-stocks-advisor-change-me-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_PATH: ${GOOGLE_REDIRECT_PATH:-/auth/google/callback}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-ph-stocks-advisor}
      WEB_WORKERS: ${WEB_WORKERS:-4}
      WEB_WORKER_CLASS: ${WEB_WORKER_CLASS:-ph_stocks_advisor.web.worker.GeventWorkerNoSSL}
      WEB_WORKER_CONNECTIONS: ${WEB_WORKER_CONNECTIONS:-1000}
      WEB_TIMEOUT: ${WEB_TIMEOUT:-120}
      PG_POOL_MIN: ${PG_POOL_MIN:-2}
      PG_POOL_MAX: ${PG_POOL_MAX:-5}
      REDIS_MAX_CONNECTIONS: ${REDIS_MAX_CONNECTIONS:-10}
    volumes:
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    entrypoint: ["ph-advisor-web"]
    command: ["--host", "0.0.0.0", "--port", "5000"]

  # ── Celery worker ──────────────────────────────────────────────────────────
  worker:
    image: ${APP_IMAGE:-ghcr.io/phdwight/agentic-ph-stocks-advisor:latest}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *shared-env
    volumes:
      - ./output:/app/output
    restart: unless-stopped
    entrypoint: ["celery"]
    command: ["-A", "ph_stocks_advisor.web.celery_app:celery_app", "worker", "--loglevel=info", "--concurrency=${CELERY_CONCURRENCY:-4}", "--pool=prefork"]

  # ── SQLAdmin (database admin panel) ────────────────────────────────────────
  admin:
    image: ${ADMIN_IMAGE:-ghcr.io/phdwight/agentic-ph-stocks-advisor-admin:latest}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ADMIN_PORT:-8085}:8085"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ph_advisor}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ph_advisor}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-sqladmin-dev-secret-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
    restart: unless-stopped

volumes:
  pgdata:
