# CI/CD pipeline for the main (production) branch.
# Runs the same quality gates as develop, then deploys to one or both targets:
#   - Azure Container Apps  (when AZURE_CREDENTIALS secret is set)
#   - Docker Compose via SSH (when DEPLOY_SSH_KEY secret is set)

name: CI/CD — Main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: cicd-main-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  # ── Lint & type-check ────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        uses: jakebailey/pyright-action@v2
        with:
          python-path: .venv/bin/python
        timeout-minutes: 5

  # ── Unit tests (no secrets, fully mocked) ────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev --extra dev

      - name: Run unit tests
        run: uv run pytest tests/ -v -m "not integration" --tb=short
        env:
          LANGCHAIN_TRACING_V2: "false"
          LANGSMITH_TRACING: "false"

  # ── Integration tests (real LLM calls, requires secrets) ─────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    needs: [quality, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev --extra dev

      - name: Run integration tests
        run: uv run pytest tests/ -v -m "integration" --tb=short
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_PROJECT: "ph-stocks-advisor-ci"

  # ── Build & push Docker images to GHCR ────────────────────────────────────
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_BASE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker meta (admin)
        id: meta-admin
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}-admin
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build & push admin image
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          file: admin/Dockerfile
          push: true
          tags: ${{ steps.meta-admin.outputs.tags }}
          labels: ${{ steps.meta-admin.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Azure Container Apps ────────────────────────────────────────
  deploy-azure:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: azure
    steps:
      - name: Check Azure secrets
        id: check
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip == 'false'

      - name: Azure Login
        if: steps.check.outputs.skip == 'false'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        if: steps.check.outputs.skip == 'false'
        run: ./infra/azure/deploy.sh --update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'ph-stocks-advisor-rg' }}
          AZURE_APP_NAME: ${{ vars.AZURE_APP_NAME || 'phstocks' }}
          IMAGE_TAG: ${{ github.sha }}

      - name: Skipped
        if: steps.check.outputs.skip == 'true'
        run: echo "⏭ Azure deployment skipped — AZURE_CREDENTIALS secret not configured"

  # ── Deploy via Docker Compose over SSH ───────────────────────────────────
  deploy-ssh:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, integration-tests, build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Check SSH secrets
        id: check
        run: |
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: steps.check.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ${{ vars.DEPLOY_PATH || '~/ph-stocks-advisor' }}

            echo "▸ Pulling pre-built images from GHCR …"
            docker compose -f docker-compose.prod.yml pull

            echo "▸ Restarting services …"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "▸ Cleaning up old images …"
            docker image prune -f

            echo "▸ Waiting for health check …"
            sleep 10
            curl -sf http://localhost:${WEB_PORT:-5000}/healthz || {
              echo "❌ Health check failed"
              docker compose -f docker-compose.prod.yml logs --tail=50 web
              exit 1
            }

            echo "✔ Deployment complete"

      - name: Skipped
        if: steps.check.outputs.skip == 'true'
        run: echo "⏭ SSH deployment skipped — DEPLOY_SSH_KEY secret not configured"
