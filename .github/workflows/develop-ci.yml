# CI pipeline for the develop branch.
# Runs linting (Ruff), type checking (Pyright), and tests (pytest)
# using the 'uv' package manager for fast dependency resolution.

name: CI — Develop

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  # ── Lint & type-check ────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        run: uv run pyright

  # ── Unit tests (no secrets, fully mocked) ────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev --extra dev

      - name: Run unit tests
        run: uv run pytest tests/ -v -m "not integration" --tb=short
        env:
          LANGCHAIN_TRACING_V2: "false"
          LANGSMITH_TRACING: "false"

  # ── Integration tests (real LLM calls, requires secrets) ─────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Only run on push to develop (not on PRs from forks, which lack secrets)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    needs: [quality, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev --extra dev

      - name: Run integration tests
        run: uv run pytest tests/ -v -m "integration" --tb=short
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_PROJECT: "ph-stocks-advisor-ci"
